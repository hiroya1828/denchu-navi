<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電柱番号検索</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #f5f5f3;
  color: #1a1a1a;
  min-height: 100vh;
}

/* ═══════════════════════════════
   検索画面
═══════════════════════════════ */
#page-search { display: block; }
#page-detail  { display: none;  }

.search-header {
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  padding: 1rem 1.5rem;
}
.search-header h1 { font-size: 16px; font-weight: 600; color: #333; }

.search-main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }

.search-wrap { position: relative; margin-bottom: 0.75rem; }
.search-wrap input {
  width: 100%;
  font-size: 16px;
  padding: 11px 44px 11px 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
  background: #fff;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-wrap input:focus {
  border-color: #888;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
}
.search-icon {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  color: #aaa; font-size: 18px; pointer-events: none;
}
.clear-btn {
  position: absolute; right: 38px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: #aaa;
  font-size: 16px; padding: 4px; display: none; line-height: 1;
}
.clear-btn:hover { color: #555; }

.status { font-size: 13px; color: #777; margin-bottom: 1rem; }
.status strong { color: #333; }

.results { display: flex; flex-direction: column; gap: 8px; }
.card {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 10px;
  padding: 0.85rem 1.1rem;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.12s;
}
.card:hover {
  border-color: #aaa;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.card-row1 { display: flex; align-items: baseline; gap: 8px; margin-bottom: 5px; }
.card-row2 { display: flex; align-items: baseline; gap: 8px; }

.mgmt-no {
  font-size: 13px; font-weight: 700; color: #555;
  background: #f0f0ee; border-radius: 4px;
  padding: 2px 10px; white-space: nowrap; flex-shrink: 0;
  font-family: 'Courier New', monospace;
  min-width: 4.5em; text-align: center;
}
.facility-name {
  font-size: 15px; font-weight: 600; color: #1a1a1a;
  flex: 1; min-width: 0;
}
.pole-sub {
  font-size: 12px; color: #aaa;
  flex: 1; min-width: 0;
  text-align: right;
}
.pole-no {
  font-size: 15px; font-weight: 600; color: #1a5fa8;
  white-space: nowrap;
}
.pole-unregistered {
  font-size: 15px; font-weight: 700; color: #c0392b;
  white-space: nowrap;
}

mark {
  background: transparent; color: inherit;
  font-weight: 700;
  text-decoration: underline;
  text-decoration-color: #1a5fa8;
  text-underline-offset: 2px;
}
.empty  { text-align: center; padding: 3rem 0; color: #999; font-size: 14px; }
.loading{ text-align: center; padding: 2rem 0; color: #999; font-size: 14px; }

@media (max-width: 480px) {
  .facility-name { font-size: 14px; }
  .pole-no { font-size: 14px; }
}

/* ═══════════════════════════════
   詳細画面
═══════════════════════════════ */
#page-detail {
  min-height: 100vh;
  display: none;
  flex-direction: column;
  background: #f5f5f3;
}

/* 上部バー */
.detail-topbar {
  background: #fff;
  border-bottom: 1px solid #e0e0e0;
  padding: 0.7rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
}
.back-btn {
  background: none; border: none; cursor: pointer;
  font-size: 15px; font-weight: 600; color: #1a5fa8;
  display: flex; align-items: center; gap: 4px;
  padding: 4px 6px; border-radius: 6px;
  transition: background 0.12s;
}
.back-btn:hover { background: #f0f0ee; }
.detail-topbar-title {
  font-size: 13px; color: #999; margin-left: 2px;
}

/* 詳細コンテンツ全体 */
.detail-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem 3rem;
  gap: 0;
  max-width: 560px;
  margin: 0 auto;
  width: 100%;
}

/* 管理番号（事業場名の頭に inline で並ぶ） */
.detail-mgmt {
  font-size: 13px; font-weight: 700; color: #888;
  background: #ebebea; border-radius: 5px;
  padding: 2px 10px;
  font-family: 'SF Mono', 'Noto Sans Mono', 'BIZ UDGothic', monospace;
  letter-spacing: 0.04em;
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
  flex-shrink: 0;
}

/* 事業場名行 */
.detail-name {
  font-size: 24px; font-weight: 700; color: #1a1a1a;
  text-align: center;
  line-height: 1.4;
  margin-bottom: 1.8rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* 電柱番号メイン */
.detail-pole-number {
  font-size: clamp(40px, 11vw, 68px);
  font-weight: 800;
  color: #1a5fa8;
  font-family: 'SF Mono', 'Noto Sans Mono', 'M PLUS 1 Code', 'BIZ UDGothic', monospace;
  letter-spacing: 0.04em;
  line-height: 1.1;
  text-align: center;
  margin-bottom: 0.6rem;
}
.detail-pole-number.unregistered {
  color: #c0392b;
  font-size: clamp(32px, 9vw, 52px);
}

/* 補足情報（直書き） */
.detail-sub-text {
  font-size: 16px; color: #aaa;
  text-align: center;
  margin-bottom: 2rem;
  letter-spacing: 0.02em;
}

/* 営業所ボタン */
.detail-office-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 16px 20px;
  background: #1a5fa8; color: #fff;
  border: none; border-radius: 14px;
  font-size: 17px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  margin-bottom: 1.4rem;
}
.detail-office-btn:hover  { opacity: 0.88; }
.detail-office-btn:active { transform: scale(0.98); }
.detail-office-btn.no-tel {
  background: #e8e8e8; color: #aaa; cursor: default;
}
.detail-office-btn.no-tel:hover  { opacity: 1; }
.detail-office-btn.no-tel:active { transform: none; }

/* 電話確認ダイアログ */
.tel-dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.38);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; padding: 1.5rem;
}
.tel-dialog {
  background: #fff;
  border-radius: 16px;
  padding: 1.75rem 1.75rem 1.5rem;
  max-width: 320px; width: 100%;
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  text-align: center;
}
.tel-dialog-icon { font-size: 32px; margin-bottom: 0.5rem; }
.tel-dialog h2 {
  font-size: 13px; font-weight: 500; color: #aaa;
  margin-bottom: 0.4rem;
}
.tel-dialog .tel-subtitle {
  font-size: 22px; font-weight: 800; color: #1a1a1a;
  margin-bottom: 0.6rem;
}
.tel-dialog .tel-number {
  font-size: 20px; font-weight: 700; color: #1a5fa8;
  font-family: 'SF Mono', 'Noto Sans Mono', 'BIZ UDGothic', monospace;
  letter-spacing: 0.05em;
  margin-bottom: 1.4rem;
}
.tel-dialog-btns { display: flex; gap: 8px; }
.tel-dialog-btns button {
  flex: 1; padding: 11px 0; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  border: none; transition: opacity 0.15s;
}
.tel-dialog-btns button:hover { opacity: 0.82; }
.btn-cancel { background: #f0f0ee; color: #555; }
.btn-call   { background: #1a5fa8; color: #fff; }
</style>
</head>
<body>

<!-- ══ 検索画面 ══ -->
<div id="page-search">
  <header class="search-header">
    <h1>⚡ 電柱番号検索</h1>
  </header>
  <main class="search-main">
    <div class="search-wrap">
      <input type="text" id="q" placeholder="管理番号・事業場名・電柱番号で検索" autocomplete="off" />
      <button class="clear-btn" id="clear-btn" aria-label="クリア">✕</button>
      <span class="search-icon">🔍</span>
    </div>
    <div class="status" id="status">読み込み中...</div>
    <div class="results" id="results">
      <div class="loading">データを読み込んでいます...</div>
    </div>
  </main>
</div>

<!-- ══ 詳細画面 ══ -->
<div id="page-detail">
  <div class="detail-topbar">
    <button class="back-btn" id="back-btn">← 戻る</button>
    <span class="detail-topbar-title">検索結果へ</span>
  </div>
  <div class="detail-body" id="detail-body">
    <!-- JS で描画 -->
  </div>
</div>

<script>
let DATA    = [];
let OFFICES = {};
let currentQ = '';

/* ── パーサー ── */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  return lines.slice(1).map(line => {
    const cols = line.split(',');
    return {
      id:         (cols[0] || '').trim(),
      name:       (cols[1] || '').trim(),
      office:     (cols[2] || '').trim(),
      substation: (cols[3] || '').trim(),
      line:       (cols[4] || '').trim(),
      pole:       (cols[5] || '').trim(),
    };
  }).filter(d => d.id || d.name);
}

function parseOfficeCSV(text) {
  const map = {};
  text.trim().split(/\r?\n/).slice(1).forEach(line => {
    const cols = line.split(',');
    const name = (cols[0] || '').trim();
    const tel  = (cols[1] || '').trim();
    if (name && tel) map[name] = tel;
  });
  return map;
}

/* ── ユーティリティ ── */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
function normalize(s) {
  return String(s).replace(/[０-９Ａ-Ｚａ-ｚ]/g, c =>
    String.fromCharCode(c.charCodeAt(0) - 0xFEE0)
  ).toLowerCase();
}
// 半角英数字→全角（電柱番号表示用）
function toZenkaku(s) {
  return String(s).replace(/[A-Za-z0-9]/g, c =>
    String.fromCharCode(c.charCodeAt(0) + 0xFEE0)
  );
}
function highlight(text, q) {
  if (!q || !text) return esc(text);
  const normText = normalize(text);
  const normQ    = normalize(q);
  const idx = normText.indexOf(normQ);
  if (idx === -1) return esc(text);
  return esc(text.slice(0, idx))
    + '<mark>' + esc(text.slice(idx, idx + q.length)) + '</mark>'
    + esc(text.slice(idx + q.length));
}

/* ── 電話確認ダイアログ ── */
function showCallDialog(officeName, tel) {
  const overlay = document.createElement('div');
  overlay.className = 'tel-dialog-overlay';
  overlay.innerHTML = `
    <div class="tel-dialog" role="dialog" aria-modal="true">
      <div class="tel-dialog-icon">📞</div>
      <h2>電話をかけますか？</h2>
      <div class="tel-subtitle">${esc(officeName)}営業所</div>
      <div class="tel-number">${esc(tel)}</div>
      <div class="tel-dialog-btns">
        <button class="btn-cancel" id="dlg-cancel">キャンセル</button>
        <button class="btn-call"   id="dlg-call">発信する</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  // モーダル用に履歴を1件積む
  history.pushState({ page: 'dialog' }, '');

  // ボタン押下時はoverlay除去のみ。履歴は history.back() で戻し、
  // popstate ハンドラー側で overlay.remove() が呼ばれないよう
  // 先に overlay を除去してから back() する
  const closeByButton = () => {
    overlay.remove();   // 先に除去
    history.back();     // dialog 分の履歴を戻す（popstate が発火するが overlay はもうない）
  };

  overlay.querySelector('#dlg-cancel').addEventListener('click', closeByButton);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeByButton(); });
  overlay.querySelector('#dlg-call').addEventListener('click', () => {
    overlay.remove();
    history.back();
    window.location.href = 'tel:' + tel.replace(/-/g, '');
  });
  overlay.querySelector('#dlg-cancel').focus();
}

/* ══ 詳細画面 ══ */
function showDetail(d) {
  document.getElementById('page-search').style.display = 'none';
  const detailPage = document.getElementById('page-detail');
  detailPage.style.display = 'flex';

  // 履歴に詳細画面を積む → Androidの戻るボタンで popstate が発火する
  history.pushState({ page: 'detail' }, '');

  const tel     = d.office ? OFFICES[d.office] || null : null;
  const hasPole = !!d.pole;

  // 補足情報を1行で組み立て
  const subParts = [
    d.substation ? esc(d.substation) + '変電所' : '',
    d.line       ? esc(d.line) + '線' : '',
  ].filter(Boolean).join('　');

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-name">
      <span class="detail-mgmt">${esc(d.id)}</span>${esc(d.name)}
    </div>
    <div class="detail-pole-number${hasPole ? '' : ' unregistered'}">
      ${hasPole ? esc(toZenkaku(d.pole)) : '未登録'}
    </div>
    ${subParts ? `<div class="detail-sub-text">${subParts}</div>` : '<div style="margin-bottom:2rem"></div>'}
    ${d.office ? `
    <button class="detail-office-btn${tel ? '' : ' no-tel'}" id="office-call-btn">
      📞 ${esc(d.office)}営業所${tel ? '' : '（電話番号なし）'}
    </button>` : ''}
  `;

  if (d.office && tel) {
    document.getElementById('office-call-btn').addEventListener('click', () => {
      showCallDialog(d.office, tel);
    });
  }

  window.scrollTo(0, 0);
}

/* ── 検索画面に戻る ── */
function goBack() {
  document.getElementById('page-detail').style.display = 'none';
  document.getElementById('page-search').style.display = 'block';
}

document.getElementById('back-btn').addEventListener('click', () => {
  // pushState で積んだ分を戻す（popstate が発火し goBack が呼ばれる）
  history.back();
});

// Androidの戻るボタン / ブラウザ戻るボタン
window.addEventListener('popstate', (e) => {
  // モーダルが開いていれば閉じる（詳細画面には戻らない）
  const overlay = document.querySelector('.tel-dialog-overlay');
  if (overlay) {
    overlay.remove();
    return;
  }
  if (document.getElementById('page-detail').style.display === 'flex') {
    goBack();
  }
});

/* ══ 検索画面レンダリング ══ */
function render(q) {
  currentQ = q;
  const trimQ = q.trim();
  const normQ = normalize(trimQ);
  const hits = trimQ
    ? DATA.filter(d =>
        normalize(d.id).includes(normQ) ||
        normalize(d.name).includes(normQ) ||
        normalize(d.pole).includes(normQ)
      )
    : DATA;

  document.getElementById('clear-btn').style.display = trimQ ? 'block' : 'none';

  const statusEl = document.getElementById('status');
  statusEl.innerHTML = trimQ
    ? `<strong>${hits.length}</strong> 件ヒット（全 ${DATA.length} 件中）`
    : `全 <strong>${DATA.length}</strong> 件`;

  const resultsEl = document.getElementById('results');
  if (hits.length === 0) {
    resultsEl.innerHTML = '<div class="empty">該当する事業場が見つかりませんでした</div>';
    return;
  }

  resultsEl.innerHTML = hits.map((d, i) => {
    const subParts = [
      d.office     ? esc(d.office) + '営業所' : '',
      d.substation ? esc(d.substation) + '変電所' : '',
      d.line       ? esc(d.line) + '線' : '',
    ].filter(Boolean).join('　');

    return `
    <div class="card" data-idx="${i}">
      <div class="card-row1">
        <span class="mgmt-no">${highlight(d.id, trimQ)}</span>
        <span class="facility-name">${highlight(d.name, trimQ)}</span>
      </div>
      <div class="card-row2">
        <span class="pole-sub">${subParts}</span>
        ${d.pole
          ? `<span class="pole-no">${highlight(toZenkaku(d.pole), trimQ)}</span>`
          : `<span class="pole-unregistered">未登録</span>`}
      </div>
    </div>`;
  }).join('');

  // カードクリック → 詳細
  resultsEl.querySelectorAll('.card').forEach((el, i) => {
    el.addEventListener('click', () => showDetail(hits[i]));
  });
}

const qEl      = document.getElementById('q');
const clearBtn = document.getElementById('clear-btn');
qEl.addEventListener('input', () => render(qEl.value));
clearBtn.addEventListener('click', () => { qEl.value = ''; qEl.focus(); render(''); });

/* ── CSV 読み込み ── */
const SAMPLE_DATA_CSV = `管理番号,事業場名,営業所,変電所,線,電柱番号
1,サンプル商事,中央,第一,本町,001ア001
2,サンプル工業,北部,第二,北町,002イ002
3,サンプル病院,南部,第三,南町,
4,サンプル薬局,中央,第一,本町,004エ004`;

const SAMPLE_OFFICES_CSV = `営業所,電話番号
中央,000-0000-0001
北部,000-0000-0002
南部,000-0000-0003`;

Promise.allSettled([
  fetch('./data.csv').then(r    => { if (!r.ok) throw new Error(); return r.text(); }),
  fetch('./offices.csv').then(r => { if (!r.ok) throw new Error(); return r.text(); }),
]).then(([dataRes, offRes]) => {
  const dataText = dataRes.status === 'fulfilled' ? dataRes.value : SAMPLE_DATA_CSV;
  const offText  = offRes.status  === 'fulfilled' ? offRes.value  : SAMPLE_OFFICES_CSV;

  const warn = [];
  if (dataRes.status !== 'fulfilled') warn.push('data.csv');
  if (offRes.status  !== 'fulfilled') warn.push('offices.csv');
  if (warn.length > 0) {
    document.getElementById('status').innerHTML =
      `⚠️ ${warn.join('、')} が見つからないためサンプルデータを表示しています`;
  }

  DATA    = parseCSV(dataText);
  OFFICES = parseOfficeCSV(offText);
  render('');
});
</script>
</body>
</html>
